name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_EVENT_CONTRACT_ID: placeholder
          NEXT_PUBLIC_TICKET_CONTRACT_ID: placeholder
          NEXT_PUBLIC_PAYMENT_CONTRACT_ID: placeholder
          NEXT_PUBLIC_USDC_CONTRACT_ID: placeholder
